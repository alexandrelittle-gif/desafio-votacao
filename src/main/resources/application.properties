spring.application.name=desafio-votacao
spring.mvc.apiversion.use.path-segment=1
spring.mvc.apiversion.default=1.0
spring.mvc.apiversion.detect-supported=true
spring.datasource.hikari.minimumIdle=0
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.maxLifetime=900000
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.datasource.hikari.auto-commit=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/desafio_votacao?autoReconnect=true}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
management.endpoints.web.exposure.include=health,info,metrics
springdoc.swagger-ui.path=/swagger-ui.html